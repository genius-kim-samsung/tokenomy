name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

# 2026-06-16부터 GitHub Actions가 Node 20 기반 액션을 Node 24로 강제 실행한다.
# 미리 opt-in해 deprecation 경고를 없애고 호환을 확보한다.
# (근본 해결은 checkout/setup-python/action-gh-release 메이저 버전 업그레이드 — 다음 점검 시.)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Verify tag matches __version__
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          VER=$(python -c "import tokenomy; print(tokenomy.__version__)")
          echo "tag=$TAG  __version__=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::git tag ($TAG) != tokenomy.__version__ ($VER)"
            exit 1
          fi

      - name: Build exe
        run: pyinstaller tokenomy.spec

      - name: Smoke test exe
        shell: bash
        run: |
          OUT=$(dist/Tokenomy.exe --version)
          echo "exe --version: $OUT"
          test "$OUT" = "$(python -c "import tokenomy; print(tokenomy.__version__)")"

      - name: Upload exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Tokenomy.exe
          generate_release_notes: true   # 빈 본문 방지(안전망) — 큐레이션 노트는 skill 5.5에서 덮어씀
