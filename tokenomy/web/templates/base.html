<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tokenomy</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="wrap">{% block body %}{% endblock %}</main>
  {% block scripts %}{% endblock %}
  <script>
    // 외부 링크(비 localhost http/https)는 네이티브 창 대신 기본 브라우저로.
    // pywebview 환경에서만 가로채고, 일반 브라우저에서는 가드로 no-op.
    document.addEventListener('click', function (e) {
      var a = e.target.closest && e.target.closest('a[href]');
      if (!a) return;
      var href = a.href;
      if (!/^https?:\/\//i.test(href)) return;
      var host;
      try { host = new URL(href).hostname; } catch (_) { return; }
      if (host === '127.0.0.1' || host === 'localhost') return;
      if (window.pywebview && window.pywebview.api && window.pywebview.api.open_external) {
        e.preventDefault();
        window.pywebview.api.open_external(href);
      }
    });
  </script>
</body>
</html>
