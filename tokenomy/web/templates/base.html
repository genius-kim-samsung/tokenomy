<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tokenomy</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="app">
    {% include "_sidebar.html" %}
    <main class="content">
      {% if notice == "ingest-failed" %}
      <div class="banner error">수집 중 오류 — 기존 데이터를 표시합니다.</div>
      {% endif %}
      {% block body %}{% endblock %}
    </main>
  </div>
  <script src="/static/vendor/htmx.min.js"></script>
  <script src="/static/tree.js"></script>
  <script src="/static/rel-time.js"></script>
  {% block scripts %}{% endblock %}
  <script>
    // 외부 링크(비 localhost http/https)는 네이티브 창 대신 기본 브라우저로.
    document.addEventListener('click', function (e) {
      var a = e.target.closest && e.target.closest('a[href]');
      if (!a) return;
      var href = a.href;
      if (!/^https?:\/\//i.test(href)) return;
      var host;
      try { host = new URL(href).hostname; } catch (_) { return; }
      if (host === '127.0.0.1' || host === 'localhost') return;
      if (window.pywebview && window.pywebview.api && window.pywebview.api.open_external) {
        e.preventDefault();
        window.pywebview.api.open_external(href);
      }
    });
  </script>
</body>
</html>
