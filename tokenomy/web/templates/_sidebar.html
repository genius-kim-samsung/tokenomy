<aside class="sidebar">
  <a class="brand" href="/">
    <span class="brand-mark" aria-hidden="true">🪙</span>
    <span class="brand-name">Tokenomy</span>
  </a>
  <nav class="nav">
    <a href="/"         class="nav-item {{ 'on' if active_nav == 'dashboard' }}">대시보드</a>
    <a href="/history"  class="nav-item {{ 'on' if active_nav == 'history' }}">내역</a>
    {% if show_official_history %}<a href="/official-history" class="nav-item {{ 'on' if active_nav == 'official_history' }}">공식 사용 이력</a>{% endif %}
    <a href="/analysis" class="nav-item {{ 'on' if active_nav == 'analysis' }}">차원별</a>
    <a href="/settings" class="nav-item {{ 'on' if active_nav == 'settings' }}">설정</a>
  </nav>
  <div class="nav-foot">
    {% if last_ingest_at %}<div class="muted">수집: <time class="rel-time" data-ts="{{ last_ingest_at }}">{{ last_ingest_at|kstfmt }}</time></div>{% endif %}
    <form method="post" action="/ingest" class="inline">
      <button class="btn" type="submit" title="로컬 로그를 다시 수집">↻ 수집</button>
    </form>
    {# 미니뷰 전환(ADR 0008, 배타 전환) — webview 전용이라 기본 숨김, pywebview 준비 시 표시 #}
    <button id="mini-switch" class="btn" type="button" onclick="switchToMini()"
            title="작게 흘끗 보는 미니 뷰로 전환" style="display:none">⊟ 미니뷰</button>
    <div class="muted">v{{ app_version }}</div>
    {% if update_tag %}
    <a class="update-link" href="https://github.com/genius-kim-samsung/tokenomy/releases/latest"
       target="_blank" rel="noopener">새 버전 {{ update_tag }}</a>
    {% endif %}
  </div>
</aside>
